<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CACTUS 3D Test</title>
  <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 16px;
      color: #1d2630;
      background: #f6f8fb;
    }
    .panel {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #d8e0e8;
      border-radius: 10px;
      padding: 14px;
    }
    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 12px;
    }
    textarea {
      width: 100%;
      min-height: 70px;
      resize: vertical;
      font-family: Consolas, monospace;
      font-size: 13px;
      padding: 8px;
      border: 1px solid #c7d2de;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: fit-content;
      padding: 8px 12px;
      border: 1px solid #1f5f87;
      border-radius: 6px;
      background: #2475a8;
      color: #fff;
      cursor: pointer;
    }
    #viewer {
      width: 100%;
      height: 70vh;
      min-height: 420px;
      border: 1px solid #d8e0e8;
      border-radius: 8px;
      background: #ffffff;
    }
    #status {
      margin-bottom: 8px;
      font-size: 13px;
      color: #324252;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="panel">
    <h2>NCI CACTUS + 3Dmol.js Test</h2>
    <div class="controls">
      <label for="smiles">SMILES</label>
      <textarea id="smiles">C1CN2CC3=CCO[C@H]4CC(=O)N5[C@H]6[C@H]4[C@H]3C[C@H]2[C@@]61C7=CC=CC=C75</textarea>
      <button id="render">Render 3D</button>
    </div>
    <div id="status">Ready.</div>
    <div id="viewer"></div>
  </div>

  <script>
    let viewer = null;

    function setStatus(message) {
      document.getElementById('status').textContent = message;
    }

    async function fetchCactus3DSdf(smiles) {
      const url = `https://cactus.nci.nih.gov/chemical/structure/${encodeURIComponent(smiles)}/file?format=sdf&get3d=true`;
      const response = await fetch(url, {
        method: 'GET',
        headers: {
          Accept: 'chemical/x-mdl-sdfile, text/plain;q=0.9, */*;q=0.1'
        }
      });
      if (!response.ok) {
        throw new Error(`CACTUS request failed (${response.status}).`);
      }
      const sdf = await response.text();
      if (!sdf || !sdf.includes('M  END')) {
        throw new Error('CACTUS returned an invalid SDF payload.');
      }
      return sdf;
    }

    async function render3D() {
      const smiles = document.getElementById('smiles').value.trim();
      if (!smiles) {
        setStatus('Enter a SMILES string.');
        return;
      }
      try {
        setStatus('Fetching 3D SDF from NCI CACTUS...');
        const sdf = await fetchCactus3DSdf(smiles);
        if (!viewer) {
          viewer = $3Dmol.createViewer('viewer', { backgroundColor: 'white' });
        }
        viewer.clear();
        viewer.addModel(sdf, 'sdf');
        viewer.setStyle({}, { stick: { radius: 0.18, colorscheme: 'Jmol' }, sphere: { scale: 0.28, colorscheme: 'Jmol' } });
        viewer.zoomTo();
        viewer.render();
        setStatus('Rendered with CACTUS 3D SDF + 3Dmol.');
      } catch (err) {
        setStatus(`Render failed: ${err.message || err}`);
      }
    }

    window.addEventListener('load', () => {
      document.getElementById('render').addEventListener('click', render3D);
      render3D();
    });
  </script>
</body>
</html>
